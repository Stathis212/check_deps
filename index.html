<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stack Monitor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f9f9f8; --surface: #ffffff;
      --border: rgba(0,0,0,0.1); --border-md: rgba(0,0,0,0.18);
      --text: #1a1a18; --text-muted: #6b6b68; --text-hint: #9b9b98;
      --success-bg: #eaf3de; --success-text: #3b6d11;
      --warning-bg: #faeeda; --warning-text: #854f0b;
      --danger-bg:  #fcebeb; --danger-text:  #a32d2d;
      --info-bg:    #e6f1fb; --info-text:    #185fa5;
      --r-md: 8px; --r-lg: 12px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a18; --surface: #242422;
        --border: rgba(255,255,255,0.1); --border-md: rgba(255,255,255,0.2);
        --text: #f0efe8; --text-muted: #9b9b98; --text-hint: #6b6b68;
        --success-bg: #173404; --success-text: #c0dd97;
        --warning-bg: #412402; --warning-text: #fac775;
        --danger-bg:  #501313; --danger-text:  #f09595;
        --info-bg:    #042c53; --info-text:    #85b7eb;
      }
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.6; }
    header { border-bottom: 0.5px solid var(--border); padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; background: var(--surface); flex-wrap: wrap; gap: 10px; }
    .header-left { display: flex; align-items: center; gap: 10px; }
    h1 { font-size: 14px; font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-muted); }
    #last-checked { font-size: 12px; color: var(--text-hint); }
    button { font-size: 13px; padding: 5px 14px; border-radius: 20px; border: 0.5px solid var(--border-md); background: transparent; color: var(--text); cursor: pointer; display: flex; align-items: center; gap: 5px; transition: background 0.15s; }
    button:hover { background: var(--border); }
    main { max-width: 860px; margin: 0 auto; padding: 2rem 1.5rem; }
    .tab-bar { display: flex; gap: 6px; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .tab { font-size: 13px; padding: 5px 16px; border-radius: 20px; border: 0.5px solid var(--border-md); background: transparent; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; gap: 5px; }
    .tab.active { background: var(--surface); color: var(--text); font-weight: 500; }
    .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--r-lg); padding: 1rem 1.25rem; margin-bottom: 10px; }
    .pkg-name { font-size: 15px; font-weight: 500; }
    .pkg-repo { font-size: 12px; color: var(--text-hint); margin-top: 1px; }
    .rel-row { display: flex; align-items: center; justify-content: space-between; font-size: 13px; padding: 6px 10px; border-radius: var(--r-md); background: var(--bg); margin-bottom: 5px; }
    .badge { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 20px; white-space: nowrap; }
    .b-latest   { background: var(--success-bg); color: var(--success-text); }
    .b-eol      { background: var(--danger-bg);  color: var(--danger-text); }
    .b-upcoming { background: var(--warning-bg); color: var(--warning-text); }
    .b-prev     { background: var(--bg); color: var(--text-muted); border: 0.5px solid var(--border); }
    .b-critical { background: var(--danger-bg);  color: var(--danger-text); }
    .b-high     { background: var(--warning-bg); color: var(--warning-text); }
    .b-moderate { background: var(--info-bg);    color: var(--info-text); }
    .b-low      { background: var(--bg); color: var(--text-muted); border: 0.5px solid var(--border); }
    .b-new      { background: var(--danger-bg);  color: var(--danger-text); }
    .links-row { display: flex; gap: 12px; margin-top: 10px; flex-wrap: wrap; }
    .links-row a { font-size: 12px; color: var(--info-text); text-decoration: none; }
    .links-row a:hover { text-decoration: underline; }

    /* EOL banner */
    .eol-banner { border-radius: var(--r-md); padding: 10px 12px; margin-top: 10px; font-size: 13px; }
    .eol-banner.upcoming { background: var(--warning-bg); color: var(--warning-text); }
    .eol-banner.passed   { background: var(--danger-bg);  color: var(--danger-text); }
    .eol-banner strong   { font-weight: 500; }

    /* CVE rows */
    .sec-row { font-size: 13px; padding: 10px 12px; border-radius: var(--r-md); background: var(--bg); margin-bottom: 6px; }
    .sec-title { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; flex-wrap: wrap; }
    .sec-id  { color: var(--text-muted); font-size: 12px; }
    .sec-pkg { color: var(--text-hint);  font-size: 12px; }
    .sec-summary { color: var(--text); margin-bottom: 5px; }
    .sec-meta { font-size: 12px; color: var(--text-muted); }
    .sec-meta code { font-size: 11px; background: var(--border); padding: 1px 5px; border-radius: 4px; }
    .sec-link { font-size: 12px; color: var(--info-text); text-decoration: none; margin-top: 5px; display: inline-block; }
    .section-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-hint); margin: 14px 0 6px; }
    .muted { color: var(--text-muted); font-size: 13px; padding: 6px 0; }
    footer { text-align: center; font-size: 12px; color: var(--text-hint); padding: 2rem 1.5rem; border-top: 0.5px solid var(--border); margin-top: 1rem; }
  </style>
</head>
<body>
<header>
  <div class="header-left">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--text-muted)"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    <h1>Stack Monitor</h1>
  </div>
  <div style="display:flex;align-items:center;gap:12px;">
    <span id="last-checked"></span>
    <button onclick="loadAll()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      Refresh
    </button>
  </div>
</header>

<main>
  <div class="tab-bar">
    <button class="tab active" onclick="showTab('releases',this)">Releases &amp; EOL</button>
    <button class="tab" id="tab-cve-btn" onclick="showTab('cve',this)">Security advisories</button>
  </div>
  <div id="tab-releases"></div>
  <div id="tab-cve" style="display:none;"></div>
</main>

<footer>Data: GitHub Releases API &amp; GitHub Advisory Database &nbsp;·&nbsp; CVEs shown: published within last 30 days + any unseen older advisories</footer>

<script>
// Packages whose EOL is fetched live from endoflife.date API
const EOL_API_PACKAGES = [
  {
    name: "Next.js", repo: "vercel/next.js", slug: "nextjs",
    releases: "https://github.com/vercel/next.js/releases",
    docs: "https://nextjs.org/docs"
  },
];

// Sitecore packages — EOL data fetched from .sitecore-lifecycle-cache.json
// which is written by the scraper on every GitHub Actions run and committed
const SITECORE_PACKAGES = [
  {
    name: "Sitecore JSS", repo: "Sitecore/jss", sitecoreProduct: "jss",
    releases: "https://github.com/Sitecore/jss/releases",
    docs: "https://doc.sitecore.com/xp/en/developers/hd/latest/sitecore-headless-development/sitecore-javascript-rendering-sdks--jss-.html"
  },
  {
    name: "Sitecore Content SDK", repo: "Sitecore/content-sdk", sitecoreProduct: "content sdk",
    releases: "https://github.com/Sitecore/content-sdk/releases",
    docs: "https://developers.sitecore.com/content-sdk"
  },
  {
    name: "Sitecore XM Cloud", repo: "Sitecore/xm-cloud-introduction", sitecoreProduct: "xm cloud",
    releases: "https://github.com/Sitecore/xm-cloud-introduction/releases",
    docs: "https://doc.sitecore.com/xmc"
  },
];

const PACKAGES = [...SITECORE_PACKAGES, ...EOL_API_PACKAGES];
const NPM_AUDIT_PKGS = ["next","@sitecore-jss/sitecore-jss","@sitecore-jss/sitecore-jss-nextjs","@sitecore-content-sdk/nextjs","react"];
const CVE_WINDOW_DAYS = 30;

function timeAgo(d) {
  const s = Math.floor((Date.now()-new Date(d))/1000);
  if(s<60) return "just now";
  if(s<3600) return Math.floor(s/60)+"m ago";
  if(s<86400) return Math.floor(s/3600)+"h ago";
  if(s<30*86400) return Math.floor(s/86400)+"d ago";
  return new Date(d).toLocaleDateString("en-GB",{month:"short",year:"numeric"});
}
function daysFromNow(d) { return Math.ceil((new Date(d)-Date.now())/86400000); }
function daysAgo(d) { return Math.floor((Date.now()-new Date(d))/86400000); }
function getMajor(t) { const m=t.replace(/^v/,"").match(/^(\d+)/); return m?m[1]:null; }
function sevClass(s) { return {CRITICAL:"b-critical",HIGH:"b-high",MODERATE:"b-moderate",LOW:"b-low"}[s]||"b-low"; }

function showTab(name, btn) {
  document.getElementById("tab-releases").style.display = name==="releases"?"block":"none";
  document.getElementById("tab-cve").style.display      = name==="cve"?"block":"none";
  document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

async function fetchReleases(repo) {
  const r = await fetch("https://api.github.com/repos/"+repo+"/releases?per_page=8");
  if(!r.ok) throw new Error("HTTP "+r.status);
  return r.json();
}

// Fetch Sitecore lifecycle from the scraped cache committed to the repo
async function fetchSitecoreLifecycle() {
  try {
    const r = await fetch(".sitecore-lifecycle-cache.json");
    if (!r.ok) return [];
    return (await r.json()).products || [];
  } catch { return []; }
}

// Fetch EOL cycles from endoflife.date API
async function fetchEolCycles(slug) {
  try {
    const r = await fetch(`https://endoflife.date/api/v1/products/${slug}/`);
    if (!r.ok) return [];
    return await r.json();
  } catch { return []; }
}

async function fetchAdvisories(pkg) {
  const q = JSON.stringify({query:`{ securityVulnerabilities(ecosystem:NPM,package:"${pkg}",first:10,orderBy:{field:UPDATED_AT,direction:DESC}){ nodes{ advisory{ ghsaId summary severity publishedAt permalink cvss{score} identifiers{type value} } vulnerableVersionRange firstPatchedVersion{identifier} } } }`});
  const r = await fetch("https://api.github.com/graphql",{method:"POST",headers:{"Content-Type":"application/json","User-Agent":"dep-monitor/1.0"},body:q});
  if(!r.ok) throw new Error("HTTP "+r.status);
  const d = await r.json();
  return (d?.data?.securityVulnerabilities?.nodes||[]).map(n=>({
    package:pkg,
    id: n.advisory.identifiers.find(i=>i.type==="CVE")?.value||n.advisory.ghsaId,
    summary:n.advisory.summary, severity:n.advisory.severity,
    cvss:n.advisory.cvss?.score||null, affected:n.vulnerableVersionRange,
    patched:n.firstPatchedVersion?.identifier||"No patch yet",
    published:n.advisory.publishedAt, url:n.advisory.permalink
  }));
}

function renderEolBanners(pkg) {
  const fmt = (d) => new Date(d).toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"});
  const banners = [];

  // Note banner (e.g. Content SDK active support note)
  if (pkg.note) {
    banners.push(`<div class="eol-banner" style="background:var(--info-bg);color:var(--info-text);"><strong>Note</strong> — ${pkg.note}</div>`);
  }

  // EOL banners
  for (const eol of (pkg.eolDates||[])) {
    const eolDateStr = eol.eolDate || eol.date;
    if (!eolDateStr) continue;
    const daysToEol = daysFromNow(eolDateStr);
    if (daysToEol > 90) continue;
    if (daysToEol > 0) {
      const urgency = daysToEol <= 30 ? "color:var(--danger-text);" : "";
      banners.push(`<div class="eol-banner upcoming"><strong>EOL in ${daysToEol} days</strong> — v${eol.version} reaches end-of-life on ${fmt(eolDateStr)}. <span style="${urgency}">No security patches after this date.</span></div>`);
    } else {
      banners.push(`<div class="eol-banner passed"><strong>EOL passed</strong> — v${eol.version} reached end-of-life on ${fmt(eolDateStr)}. Upgrade immediately.</div>`);
    }
  }

  // Upcoming major release banners
  for (const upcoming of (pkg.upcomingReleases||[])) {
    banners.push(`<div class="eol-banner" style="background:var(--info-bg);color:var(--info-text);"><strong>Upcoming — v${upcoming.version}</strong> — ${upcoming.note}</div>`);
  }

  return banners.join("");
}

function renderReleases(pkg, releases) {
  const seen=new Set(); const rows=[];
  for(const r of releases){
    const maj=getMajor(r.tag_name);
    if(seen.has(maj)) continue; seen.add(maj);
    const isEol = (pkg.eolDates||[]).some(e=>e.version===maj && daysFromNow(e.eolDate||e.date)<=0);
    const isLatest = rows.length===0;
    const badge = isEol ? '<span class="badge b-eol">EOL</span>' : isLatest ? '<span class="badge b-latest">Latest</span>' : '<span class="badge b-prev">v'+maj+'</span>';
    const bg = isEol ? "background:var(--danger-bg);" : "";
    rows.push(`<div class="rel-row" style="${bg}"><span style="font-weight:500;">${r.tag_name}</span><div style="display:flex;align-items:center;gap:8px;"><span style="color:var(--text-muted);">${timeAgo(r.published_at)}</span>${badge}</div></div>`);
    if(rows.length>=3) break;
  }
  const eolBanners = renderEolBanners(pkg);
  return `<div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
      <div><div class="pkg-name">${pkg.name}</div><div class="pkg-repo">${pkg.repo}</div></div>
    </div>
    ${rows.join("")}
    ${eolBanners}
    <div class="links-row"><a href="${pkg.releases}" target="_blank">↗ Releases</a><a href="${pkg.docs}" target="_blank">↗ Docs</a></div>
  </div>`;
}

function renderAdvisories(all) {
  if(!all.length) return `<div class="card"><div class="muted">No advisories found for monitored packages within the last ${CVE_WINDOW_DAYS} days.</div></div>`;

  // Split into recent vs older
  const recent = all.filter(a=>daysAgo(a.published)<=CVE_WINDOW_DAYS);
  const older  = all.filter(a=>daysAgo(a.published)>CVE_WINDOW_DAYS);

  function renderGroup(items, label) {
    if(!items.length) return "";
    const sorted = [...items].sort((a,b)=>({CRITICAL:0,HIGH:1,MODERATE:2,LOW:3}[a.severity]||3)-({CRITICAL:0,HIGH:1,MODERATE:2,LOW:3}[b.severity]||3));
    return `<div class="section-label">${label} (${items.length})</div>` + sorted.map(a=>{
      const age = daysAgo(a.published);
      const cvss = a.cvss ? ` &nbsp;·&nbsp; CVSS ${a.cvss.toFixed(1)}` : "";
      const isNew = age <= 7;
      const newBadge = isNew ? ' <span class="badge b-new" style="font-size:10px;">new</span>' : '';
      const ageTxt = age === 0 ? "today" : age+"d ago";
      return `<div class="sec-row">
        <div class="sec-title">
          <span class="badge ${sevClass(a.severity)}">${a.severity}</span>${newBadge}
          <span class="sec-id">${a.id}</span>
          <span class="sec-pkg">${a.package}${cvss}</span>
          <span style="font-size:11px;color:var(--text-hint);margin-left:auto;">${ageTxt}</span>
        </div>
        <div class="sec-summary">${a.summary}</div>
        <div class="sec-meta">Affected: <code>${a.affected}</code> &nbsp;·&nbsp; Patched: <code>${a.patched}</code></div>
        <a class="sec-link" href="${a.url}" target="_blank">View advisory ↗</a>
      </div>`;
    }).join("");
  }

  return renderGroup(recent, "Last "+CVE_WINDOW_DAYS+" days") + renderGroup(older, "Older (not yet acknowledged)");
}

async function loadAll() {
  const relEl = document.getElementById("tab-releases");
  const cveEl = document.getElementById("tab-cve");

  // Render placeholder cards with stable IDs so we can update them individually
  relEl.innerHTML = PACKAGES.map((p,i)=>`<div class="card" id="pkg-card-${i}"><div class="pkg-name">${p.name}</div><div class="muted" style="margin-top:6px;">Loading...</div></div>`).join("");
  cveEl.innerHTML = `<div class="card"><div class="muted">Querying advisory database...</div></div>`;

  // Fetch Sitecore lifecycle and Next.js EOL data in parallel
  const [sitecoreLifecycle, ...eolCycles] = await Promise.all([
    fetchSitecoreLifecycle(),
    ...EOL_API_PACKAGES.map(p => fetchEolCycles(p.slug))
  ]);

  // Map endoflife.date cycles onto EOL_API_PACKAGES
  EOL_API_PACKAGES.forEach((pkg, i) => {
    const cycles = eolCycles[i] || [];
    const arr = Array.isArray(cycles) ? cycles : Object.values(cycles);
    pkg.eolDates = arr
      .filter(c => c.eol && c.eol !== false && c.eol !== true)
      .map(c => ({ version: String(c.cycle), eolDate: c.eol }));
  });

  // Map scraped Sitecore lifecycle onto SITECORE_PACKAGES
  SITECORE_PACKAGES.forEach(pkg => {
    pkg.eolDates = (sitecoreLifecycle || [])
      .filter(e => e.product && e.product.toLowerCase().includes(pkg.sitecoreProduct))
      .filter(e => e.eolDate);
  });

  // Load each package card individually using stable IDs — avoids stale NodeList bug
  for(let i=0;i<PACKAGES.length;i++){
    const card = document.getElementById(`pkg-card-${i}`);
    if(!card) continue;
    try{
      const rel = await fetchReleases(PACKAGES[i].repo);
      // Filter out pre-releases in the browser too
      const stable = rel.filter(r => !r.prerelease && !/canary|alpha|beta|rc\./i.test(r.tag_name));
      card.outerHTML = renderReleases(PACKAGES[i], stable);
    } catch(e) {
      card.outerHTML = `<div class="card" id="pkg-card-${i}"><div class="pkg-name">${PACKAGES[i].name}</div><div class="muted" style="margin-top:6px;color:var(--danger-text);">Could not load — ${e.message}. <a href="${PACKAGES[i].releases}" target="_blank" style="color:var(--info-text);">View on GitHub ↗</a></div></div>`;
    }
  }

  // CVEs — GraphQL requires auth in the browser; fall back gracefully if blocked
  const all = [];
  for(const pkg of NPM_AUDIT_PKGS){
    try{ all.push(...await fetchAdvisories(pkg)); } catch{}
  }
  const unique = [...new Map(all.map(a=>[a.id,a])).values()];

  if(unique.length === 0){
    cveEl.innerHTML = `<div class="card"><div class="muted">No advisories returned — GitHub GraphQL requires authentication in the browser. CVE alerts are still delivered via email and Slack through GitHub Actions.</div></div>`;
  } else {
    const recentCount = unique.filter(a=>daysAgo(a.published)<=CVE_WINDOW_DAYS).length;
    cveEl.innerHTML = renderAdvisories(unique);
    const btn = document.getElementById("tab-cve-btn");
    if(recentCount>0){
      const topSev = [...unique].sort((a,b)=>({CRITICAL:0,HIGH:1,MODERATE:2,LOW:3}[a.severity]||3)-({CRITICAL:0,HIGH:1,MODERATE:2,LOW:3}[b.severity]||3))[0]?.severity.toLowerCase();
      btn.innerHTML = `Security advisories <span class="badge b-${topSev}" style="font-size:10px;">${recentCount}</span>`;
    }
  }

  document.getElementById("last-checked").textContent = "Updated "+new Date().toLocaleTimeString();
}

loadAll();
</script>
</body>
</html>
