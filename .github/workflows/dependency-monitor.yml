name: Dependency Monitor

on:
  schedule:
    - cron: '0 7 * * *'   # Morning   — 7am UTC
    - cron: '0 12 * * *'  # Noon      — 12pm UTC
    - cron: '0 16 * * *'  # Afternoon — 4pm UTC
  workflow_dispatch:      # Allows manual trigger from GitHub UI

jobs:
  check-releases:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run dependency monitor
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}   # Optional
        run: node scripts/check-deps.js

      # Sends email via GitHub's built-in notification when alerts are found.
      # Go to GitHub → Settings → Notifications → Actions → enable "Failed workflows only"
      - name: Alert summary (triggers GitHub email)
        if: failure()
        run: |
          echo "Dependency alerts were found. Check the Run dependency monitor step above for details."
          echo "Packages monitored: Sitecore JSS, Next.js, Sitecore XM Cloud"